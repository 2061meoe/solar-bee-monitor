<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Bee Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1f4037,#99f2c8);
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
    flex-wrap:wrap;
}

.card{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
    width:200px;
    backdrop-filter:blur(10px);
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.value{
    font-size:28px;
    font-weight:bold;
}

.chart-container{
    width:80%;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:40px;
}
</style>
</head>

<body>

<h1>🐝 Solar Bee Monitor</h1>

<div class="container">

<div class="card">
<h3>Température</h3>
<div class="value" id="temp">-- °C</div>
</div>

<div class="card">
<h3>Humidité</h3>
<div class="value" id="hum">-- %</div>
</div>

<div class="card">
<h3>Pression</h3>
<div class="value" id="press">-- hPa</div>
</div>

</div>

<div class="chart-container">
<h2>Température</h2>
<canvas id="chartTemp"></canvas>
</div>

<div class="chart-container">
<h2>Humidité</h2>
<canvas id="chartHum"></canvas>
</div>

<div class="chart-container">
<h2>Pression</h2>
<canvas id="chartPress"></canvas>
</div>

<script>

let labels=[]

let tempData=[]
let humData=[]
let pressData=[]

const chartTemp=new Chart(
document.getElementById('chartTemp'),
{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Température °C',
data:tempData,
borderColor:'red',
fill:false
}]
},
options:{animation:false}
})

const chartHum=new Chart(
document.getElementById('chartHum'),
{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Humidité %',
data:humData,
borderColor:'blue',
fill:false
}]
},
options:{animation:false}
})

const chartPress=new Chart(
document.getElementById('chartPress'),
{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Pression hPa',
data:pressData,
borderColor:'green',
fill:false
}]
},
options:{animation:false}
})

function updateData(){

fetch("http://IP_ESP32/data")
.then(response=>response.json())
.then(data=>{

let temperature=data.temperature
let humidite=data.humidite
let pression=data.pression

document.getElementById("temp").innerText=temperature+" °C"
document.getElementById("hum").innerText=humidite+" %"
document.getElementById("press").innerText=pression+" hPa"

let now=new Date().toLocaleTimeString()

labels.push(now)
tempData.push(temperature)
humData.push(humidite)
pressData.push(pression)

if(labels.length>20){
labels.shift()
tempData.shift()
humData.shift()
pressData.shift()
}

chartTemp.update()
chartHum.update()
chartPress.update()

})
}

setInterval(updateData,3000)

</script>

</body>
</html>
